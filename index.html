<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Invoice Ledger</title>
<style>
:root {
  --ink: #12100e; --paper: #faf7f2; --rule: #d9d2c5; --accent: #b5341c;
  --st: env(safe-area-inset-top, 20px);
}
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; background: var(--paper); margin: 0; padding-top: var(--st); }

/* Improved Modal for iPhone */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:999; }
.overlay.on { display:flex; align-items:flex-end; }
.modal { 
  background: white; width: 100%; border-radius: 20px 20px 0 0; 
  padding-bottom: env(safe-area-inset-bottom); max-height: 90vh; overflow-y: auto; 
}
.mhdr { 
  padding: 20px; display: flex; justify-content: space-between; 
  border-bottom: 1px solid #eee; position: sticky; top: 0; background: white;
}
.mclose { font-size: 1.5rem; border: none; background: none; padding: 0 10px; }

/* Filter Bar */
.filter-container { padding: 10px 1rem; display: flex; gap: 8px; position: sticky; top: 0; background: var(--paper); z-index: 10; }
.filter-input { flex: 2; padding: 12px; border: 1px solid var(--rule); border-radius: 10px; font-size: 16px; }
</style>
</head>
<body>

<div class="filter-container">
  <input type="text" id="search-mat" class="filter-input" placeholder="Search Matricule..." oninput="applyFilters()">
  <input type="month" id="filter-month" class="filter-input" onchange="applyFilters()">
</div>

<div class="overlay" id="form-overlay">
  <div class="modal">
    <div class="mhdr">
      <span>New Invoice</span>
      <button class="mclose" onclick="closeModal()">✕</button>
    </div>
    </div>
</div>

<script>
// 1. IMPROVED SCAN FILTER: Replaces the inverted-color logic
function enhanceImage(dataUrl) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = img.width;
      canvas.height = img.height;
      
      // Clean, high-contrast scan look (mimics iOS Notes)
      ctx.filter = 'grayscale(1) contrast(1.4) brightness(1.1)';
      ctx.drawImage(img, 0, 0);
      resolve(canvas.toDataURL('image/jpeg', 0.85));
    };
    img.src = dataUrl;
  });
}

// 2. LIVE FILTERING LOGIC
function applyFilters() {
  const search = document.getElementById('search-mat').value.toLowerCase();
  const month = document.getElementById('filter-month').value; 
  
  const filtered = entries.filter(e => {
    const matchesMat = e.matricule.toLowerCase().includes(search);
    const matchesMonth = month ? e.date.startsWith(month) : true;
    return matchesMat && matchesMonth;
  });
  
  render(filtered);
}
</script>
</body>
</html>
