<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- White background -->
  <rect width="192" height="192" rx="40" fill="white"/>

  <!-- Olive/yellow-green square (top left) -->
  <rect x="10" y="10" width="58" height="58" rx="7" fill="#8eb832"/>
  <!-- Dark green square (overlapping center) -->
  <rect x="34" y="34" width="58" height="58" rx="7" fill="#2a7a3b"/>
  <!-- Cyan square (bottom, largest) -->
  <rect x="34" y="58" width="66" height="66" rx="7" fill="#00aec7"/>
  <!-- Red square (top right of cluster) -->
  <rect x="68" y="10" width="36" height="36" rx="6" fill="#e04a3a"/>

  <!-- CNS text -->
  <text x="108" y="148" 
    font-family="Arial Black, Arial, sans-serif" 
    font-weight="900" 
    font-size="52" 
    fill="#1a1a1a" 
    text-anchor="middle"
    letter-spacing="-1">CNS</text>
</svg>
